<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Arron Advertising</title>
    <link rel="stylesheet" href="styles.css">
    <style>
    @media (max-width: 600px) {
        .logo {
            height: 80px !important;
            max-width: 90vw !important;
        }
        .nav-menu {
            flex-direction: column !important;
            gap: 1rem !important;
            font-size: 1.2rem !important;
            align-items: center !important;
        }
        .navbar .container {
            flex-direction: column !important;
            align-items: center !important;
        }
    }
    </style>
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
    <header>
        <h1 style="text-align:center;">Arron Advertising Checkout</h1>
        <nav class="checkout-navbar">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <main>
        <section class="checkout-section">
            <h2>Review Your Order</h2>
            <div id="checkout-cart-items"></div>
            <div id="checkout-total" style="font-weight:bold;margin-top:1rem;"></div>
            <form id="customer-info-form" style="margin-top:2rem;">
                <h3>Customer Information</h3>
                <label>Name: <input type="text" id="customer-name" required></label><br>
                <label>Email: <input type="email" id="customer-email" required></label><br>
                <label>Street Address:
                    <input type="text" id="customer-street" name="street" required placeholder="123 Main St">
                </label><br>
                <label>City:
                    <input type="text" id="customer-city" name="city" required placeholder="City">
                </label><br>
                <label>State:
                    <select id="customer-state" name="state" required>
                        <option value="">Select State</option>
                        <option value="AL">Alabama</option>
                        <option value="AK">Alaska</option>
                        <option value="AZ">Arizona</option>
                        <option value="AR">Arkansas</option>
                        <option value="CA">California</option>
                        <option value="CO">Colorado</option>
                        <option value="CT">Connecticut</option>
                        <option value="DE">Delaware</option>
                        <option value="FL">Florida</option>
                        <option value="GA">Georgia</option>
                        <option value="HI">Hawaii</option>
                        <option value="ID">Idaho</option>
                        <option value="IL">Illinois</option>
                        <option value="IN">Indiana</option>
                        <option value="IA">Iowa</option>
                                    <p style="font-size:1.3rem;color:#2d4a6a;margin-bottom:2rem;">Smart solutions for your home, powered by Kitchen AI.</p>
                        <option value="KY">Kentucky</option>
                        <option value="LA">Louisiana</option>
                        <option value="ME">Maine</option>
                        <option value="MD">Maryland</option>
                        <option value="MA">Massachusetts</option>
                        <option value="MI">Michigan</option>
                        <option value="MN">Minnesota</option>
                        <option value="MS">Mississippi</option>
                        <option value="MO">Missouri</option>
                        <option value="MT">Montana</option>
                        <option value="NE">Nebraska</option>
                        <option value="NV">Nevada</option>
                        <option value="NH">New Hampshire</option>
                        <option value="NJ">New Jersey</option>
                        <option value="NM">New Mexico</option>
                        <option value="NY">New York</option>
                        <option value="NC">North Carolina</option>
                        <option value="ND">North Dakota</option>
                        <option value="OH">Ohio</option>
                        <option value="OK">Oklahoma</option>
                        <option value="OR">Oregon</option>
                        <option value="PA">Pennsylvania</option>
                        <option value="RI">Rhode Island</option>
                        <option value="SC">South Carolina</option>
                        <option value="SD">South Dakota</option>
                        <option value="TN">Tennessee</option>
                        <option value="TX">Texas</option>
                        <option value="UT">Utah</option>
                        <option value="VT">Vermont</option>
                        <option value="VA">Virginia</option>
                        <option value="WA">Washington</option>
                        <option value="WV">West Virginia</option>
                        <option value="WI">Wisconsin</option>
                        <option value="WY">Wyoming</option>
                    </select>
                </label><br>
                <label>ZIP Code:
                    <input type="text" id="customer-zip" name="zip" required pattern="\d{5}" maxlength="5" placeholder="ZIP Code">
                </label><br>
                <button type="submit" class="btn-primary" style="margin-top:1rem;">Proceed to Payment</button>
            </form>
            <div id="stripe-error" style="color:red;margin-top:1rem;"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Arron Advertising. All rights reserved.</p>
    </footer>
    <script src="checkout.js"></script>
    <!-- No Google Places needed for simple address fields -->
</body>
</html>
