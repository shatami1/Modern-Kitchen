<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arron Advertising - Kitchen Appliances Agent</title>
    <link rel="stylesheet" href="styles.css">
    <style>
    body {
        background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 40%, #b6fcb6 100%);
        min-height: 100vh;
    }
    .vibrant-hero {
        background: linear-gradient(120deg, #fffbe6 0%, #e0ffe0 100%);
        border-radius: 24px;
        box-shadow: 0 4px 32px rgba(44,204,64,0.10);
        padding: 2.5rem 1.5rem 2.5rem 1.5rem;
        margin: 0 auto 2.5rem auto;
        max-width: 520px;
    }
    .vibrant-logo-box {
        background: #fff;
        border-radius: 20px;
        border: 6px solid #2ecc40;
        max-width: 420px;
        margin: 2rem auto 1.5rem auto;
        padding: 1.5rem 2rem 1rem 2rem;
        box-shadow: 0 4px 32px rgba(44,204,64,0.18);
        text-align: center;
    }
    .vibrant-nav {
        background: none;
        padding: 0;
        margin-bottom: 2.5rem;
        box-shadow: none;
    }
    .vibrant-nav .nav-menu a {
        color: #1a365d;
        text-decoration: none;
        padding: 0.5rem 1.5rem;
        border-radius: 6px;
        transition: background 0.2s, color 0.2s;
    }
    .vibrant-nav .nav-menu a:hover {
        background: #2ecc40;
        color: #fff;
    }
    .vibrant-nav .cart-link {
        background: #2ecc40;
        color: #fff !important;
        font-weight: bold;
    }
    .vibrant-footer {
        background: #2ecc40;
        color: #fff;
        text-align: center;
        padding: 1.5rem 0 1rem 0;
        margin-top: 3rem;
        border-radius: 18px 18px 0 0;
    }
    </style>
</head>
<body>
    <nav class="navbar vibrant-nav">
        <div class="container nav-mobile-container">
            <button class="hamburger" aria-label="Open menu" onclick="document.querySelector('.nav-menu').classList.toggle('open')">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html" class="cart-link">Cart</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>
    <div class="vibrant-logo-box">
        <img src='images/arron-advertising-logo.png' alt='Aaron Advertising' class="logo" style="display:block;margin:0 auto 0.5rem auto;">
        <span class="aaron-mobile-title">Aaron Advertising</span>
        <style>
        @media (max-width: 900px) {
            .logo { display: none !important; }
            .aaron-mobile-title {
                display: block !important;
                font-size: 2.1rem;
                font-weight: 900;
                color: #1a365d;
                letter-spacing: 2px;
                margin: 0.5rem auto 0.5rem auto;
                text-align: center;
                font-family: 'Segoe UI', Arial, sans-serif;
            }
        }
        @media (min-width: 901px) {
            .aaron-mobile-title { display: none !important; }
        }
        </style>
    </div>
    <style>
    .hamburger {
        display: none;
        flex-direction: column;
        justify-content: center;
        width: 38px;
        height: 38px;
        background: none;
        border: none;
        cursor: pointer;
        margin-right: 1rem;
        z-index: 1002;
    }
    .hamburger span {
        display: block;
        height: 4px;
        width: 28px;
        background: #fff;
        margin: 5px 0;
        border-radius: 2px;
        transition: all 0.3s;
    }
    @media (max-width: 900px) {
        .navbar .container.nav-mobile-container {
            flex-direction: row !important;
            align-items: flex-start !important;
            justify-content: flex-start !important;
            padding: 0.5rem 0.5rem 0.5rem 0.5rem !important;
            background: #1a365d;
            border-radius: 0 0 12px 12px;
            position: relative;
        }
        .hamburger {
            display: flex;
        }
        .nav-menu {
            position: absolute;
            top: 100%;
            left: 0;
            background: #1a365d;
            width: 200px;
            flex-direction: column !important;
            align-items: flex-start !important;
            gap: 0.5rem !important;
            margin: 0;
            padding: 1rem 0.5rem;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.13);
            display: none;
            z-index: 1001;
        }
        .nav-menu.open {
            display: flex;
        }
        .nav-menu li {
            width: 100%;
        }
        .nav-menu a {
            width: 100%;
            display: block;
            padding: 0.7rem 1rem;
            font-size: 1.1rem;
            color: #fff !important;
            border-radius: 6px;
        }
        .vibrant-logo-box {
            margin-top: 1.5rem !important;
        }
    }
    @media (max-width: 600px) {
        .navbar .container.nav-mobile-container {
            padding: 0.2rem 0.2rem 0.2rem 0.2rem !important;
        }
        .nav-menu {
            width: 98vw;
            left: 0;
        }
    }
    </style>

    <section class="hero ai-kitchen-bg">
        <div class="container vibrant-hero" style="text-align:center;">
            <h1 style="font-size:2.7rem;font-weight:900;color:#1a365d;margin-bottom:1.5rem;">Modern Kitchen Appliances</h1>
            <img src="https://spztjkstore.com/cdn/shop/files/5df4dae1240fcc53526322531b5514fc.jpg?v=1741152723&width=360" alt="Juicer" style="max-width:380px;width:100%;border-radius:18px;box-shadow:0 4px 24px rgba(44,204,64,0.13);margin-bottom:2rem;">
            <p style="font-size:1.2rem;color:#2d4a6a;margin-bottom:2.5rem;">Smart solutions for your home, powered by Kitchen AI.</p>
            <a href="products.html" class="btn-primary" style="font-size:1.2rem;padding:0.9rem 2.5rem;background:#2ecc40;color:#fff;border:none;">Browse Products</a>
        </div>
    </section>



    <footer class="footer">
        <div class="container vibrant-footer">
            <p>&copy; 2026 Aaron Advertising. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
