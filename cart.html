
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Aaron Advertising</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        @media (max-width: 900px) {
            .vibrant-logo-box {
                background: none !important;
                border: none !important;
                box-shadow: none !important;
                padding: 0 !important;
                margin: 1.2rem auto 0.7rem auto !important;
            }
            .aaron-mobile-title {
                display: block !important;
                font-size: 2.1rem;
                font-weight: 900;
                color: #1a365d;
                letter-spacing: 2px;
                margin: 0.5rem auto 0.5rem auto;
                text-align: center;
                font-family: 'Segoe UI', Arial, sans-serif;
            }
        }
        @media (min-width: 901px) {
            .aaron-mobile-title { display: none !important; }
        }
    .vibrant-logo-box {
        background: #fff;
        border-radius: 20px;
        border: 6px solid #2ecc40;
        max-width: 420px;
        margin: 2rem auto 1.5rem auto;
        padding: 1.5rem 2rem 1rem 2rem;
        box-shadow: 0 4px 32px rgba(44,204,64,0.18);
        text-align: center;
    }
    </style>
    <style>
    @media (max-width: 600px) {
        .logo {
            display: block !important;
            height: 80px !important;
            max-width: 90vw !important;
            margin: 0 auto 1rem auto !important;
        }
        .nav-menu {
            flex-direction: column !important;
            gap: 1rem !important;
            font-size: 0.84rem !important;
            align-items: center !important;
        }
        .navbar .container {
            flex-direction: column !important;
            align-items: center !important;
        }
    }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-mobile-container" style="position:relative;">
            <button class="hamburger" aria-label="Open menu" onclick="document.querySelector('.nav-menu').classList.toggle('open')">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-menu">
                                <li><a href="index.html">Home</a></li>
                                <li><a href="products.html">Products</a></li>
                                <li><a href="contact.html">Contact</a></li>
                                <li><a href="cart.html" class="cart-link"><span style="font-size:1.7em;line-height:1;">🛒</span> <span class="cart-text" style="font-size:1.1em;">Cart</span></a></li>
            </ul>
        </div>
    </nav>

    <!-- Logo removed from header -->
    <main class="cart-main" style="display:flex;justify-content:center;align-items:center;min-height:60vh;">
        <div class="container" style="max-width:700px;width:100%;text-align:center;">
            <h1>Your Cart</h1>
            <a href="products.html" class="btn-primary" style="display:inline-flex;align-items:center;margin-bottom:1.5rem;"><span style="font-size:1.5rem;margin-right:0.5rem;">&#43;</span> Add another product</a>
            <div id="cart-items"></div>
        </div>
    </main>
    <script src="cart.js"></script>
    <footer class="footer">
        <div class="container">
              <p>&copy; 2026 Aaron Advertising. All rights reserved.</p>
        </div>
    <style>
    .hamburger {
        display: none;
        flex-direction: column;
        justify-content: center;
        width: 38px;
        height: 38px;
        background: none;
        border: none;
        cursor: pointer;
        margin-right: 1rem;
        z-index: 1002;
    }
    .hamburger span {
        display: block;
        height: 4px;
        width: 28px;
        background: #fff;
        margin: 5px 0;
        border-radius: 2px;
        transition: all 0.3s;
    }
    @media (max-width: 900px) {
        .navbar .container.nav-mobile-container {
            flex-direction: row !important;
            align-items: flex-start !important;
            justify-content: flex-start !important;
            padding: 0.5rem 0.5rem 0.5rem 0.5rem !important;
            background: #1a365d;
            border-radius: 0 0 12px 12px;
            position: relative;
        }
        .hamburger {
            display: flex;
        }
        .nav-menu {
            position: absolute;
            top: 100%;
            left: 0;
            background: #1a365d;
            width: 200px;
            flex-direction: column !important;
            align-items: flex-start !important;
            gap: 0.5rem !important;
            margin: 0;
            padding: 1rem 0.5rem;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.13);
            display: none;
            z-index: 1001;
        }
        .nav-menu.open {
            display: flex;
        }
        .nav-menu li {
            width: 100%;
        }
        .nav-menu a {
            width: 100%;
            display: block;
            padding: 0.7rem 1rem;
            font-size: 1.1rem;
            color: #fff !important;
            border-radius: 6px;
        }
        .vibrant-logo-box {
            margin-top: 1.5rem !important;
        }
    }
    @media (max-width: 600px) {
        .navbar .container.nav-mobile-container {
            padding: 0.2rem 0.2rem 0.2rem 0.2rem !important;
        }
        .nav-menu {
            width: 98vw;
            left: 0;
        }
    }
    </style>
